<!DOCTYPE html>
<html>
<head>
<style>

/* Body Font */
body{
    font-family: Arial, sans-serif;
}

/* Heading Typography */
h1{
    font-size: 2rem;              /* Text Size */
    font-weight: 700;             /* Bold */
    text-align: center;           /* Center Align */
    text-transform: uppercase;    /* ABC */
    letter-spacing: 3px;          /* Letter Gap */
    text-shadow: 2px 2px 5px gray;/* Shadow */
    color: darkblue;              /* Text Color */
}

/* Paragraph Typography */
p{
    font-size: 1rem;
    line-height: 1.8;             /* Line Gap */
    word-spacing: 5px;            /* Word Gap */
}

/* Italic Text */
.italic{
    font-style: italic;
}

/* Underline Text */
.underline{
    text-decoration: underline;
}

/* Remove Underline From Link */
a{
    text-decoration: none;
    color: red;
}

/* Capitalize Example */
.capitalize{
    text-transform: capitalize;
}

</style>
</head>

<body>

    <!-- Heading -->
    <h1>css typography notes</h1>

    <!-- Normal Paragraph -->
    <p>
        Typography helps improve readability and appearance
        of text on a website.
    </p>

    <!-- Italic -->
    <p class="italic">
        This text is italic.
    </p>

    <!-- Underline -->
    <p class="underline">
        This text is underlined.
    </p>

    <!-- Capitalize -->
    <p class="capitalize">
        hello my name is dhruv.
    </p>

    <!-- Link -->
    <a href="#">
        Click Here
    </a>

</body>
</html>
