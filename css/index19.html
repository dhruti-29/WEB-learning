<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style19.css">
</head>

<body>
    <header> 
        <h1>Our Staf</h1>
        <nav><a href="#profile1">joe</a>
            <a href="#profile2">Matt</a>
            <a href="#profile3">jane</a>
        </nav>

    </header>

    <main>
        <article id="profile1" class="card">
            <figutre>
                <img src="https://img.magnific.com/free-photo/cheerful-young-caucasian-businessman_171337-727.jpg"
                    alt="joe coder" width="500" height="500">
                <figcaption>joe coder</figcaption>
            </figutre>
            <p><q>i code stuff.</q></p>
            <!--         The `<q>` tag is used to define a short quotation, and browsers usually add quotation marks around the quoted text automatically.
 -->
        </article>

        <article id="profile2" class="card">
            <figutre>
                <img src="https://img.magnific.com/free-photo/side-view-happy-businessman-using-computer-while-working-office_637285-6333.jpg?semt=ais_hybrid&w=740&q=80"
                    alt="matt designer" width="500" height="500">
                <figcaption>matt designer</figcaption>
            </figutre>
            <p><q>i matt designer.</q></p>
        </article>


        <article id="profile3" class="card">
            <figutre>
                <img src="https://t3.ftcdn.net/jpg/03/58/93/04/360_F_358930412_rodvr4vvY4LG0bUG8MKC3wwCZhWGozcW.jpg"
                    alt="jane dev rel" width="500" height="500">
                <figcaption>jane dev rel</figcaption>
            </figutre>
            <p><q>i jane <span class="nowrap">dev rel.</span></q></p>
<!--          span nowrap is used to keep the text on a single line and prevent it from wrapping to the next line.
 -->        </article>
        <footer>

            <p>
                &copy; Acme Co.
            </p>

        </footer>
</body>

</html>
