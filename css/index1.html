cascading style system 

html -> foundation  of home
css->paint of home
css  1. internal stylesheet 2.external stylesheet 3.line styleshhet

for extra text 
p*10>lorem

-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
    <!-- Different priorities: Inline > Internal > External
Same priority: The rule that comes later overrides the earlier one.

So, sequence matters, but mainly when the CSS rules have the same priority. -->
    <style>
        p{
            color :aquamarine;
        }
        
        </style>
      <!-- rel = relationship -->
       <link rel="stylesheet" href="style.css" type="text/css">
</head>
<body>
    <P style="color : blue">i am learning css </P>
</body>
</html>
